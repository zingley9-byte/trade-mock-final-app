kind = "mobile"
previewPath = "/"
title = "Trade Mock"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
# Build expo app then aggressively clean up node_modules + pnpm store so
# the deployment image stays under the 8 GiB limit.
# Both artifacts are self-contained at runtime:
#   - API server  → esbuild bundle (no node_modules needed)
#   - Mobile app  → zero-dependency serve.js using Node.js built-ins only
build = [ "bash", "-c", "pnpm --filter @workspace/mobile run build && bash scripts/deploy-cleanup.sh" ]
# Call node directly — bypasses pnpm which needs the store (removed by cleanup)
run = [ "node", "artifacts/mobile/server/serve.js" ]

[services.env]
PORT = "18115"
BASE_PATH = "/"
